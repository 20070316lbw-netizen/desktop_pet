<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      cursor: grab;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
  <canvas id="pet" width="128" height="148"></canvas>
  <script src="renderer.js"></script>
</body>
</html>
